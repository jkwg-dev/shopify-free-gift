# Shopify app configuration (config-as-code for the Shopify CLI).
#
# Flow: create the app in the Dev Dashboard (installable OAuth app) -> `shopify app config link`
# (from apps/admin) to link this file to it -> fill the PRODUCTION domain placeholders below ->
# `shopify app deploy` to push. `client_id` is written by `config link`; do not invent it.
#
# Uncertainty note: exact key names/sections can vary by CLI version (you're near 4.x). If `deploy`
# rejects a field or `config link` rewrites this file, treat the Dev Dashboard UI as the source of
# truth and re-verify every section here afterwards — especially [app_proxy]. Do NOT invent a domain.

name = "free-gift-engine"
application_url = "https://free-gift-tiered.vercel.app"
# Headless for now (OAuth install + App Proxy + webhooks only). Phase 3b flips this to true and adds
# the embedded App Bridge + Polaris admin.
embedded = false

[access_scopes]
# Minimal scopes the engine actually uses (see composition.ts GIFT_ENGINE_SCOPES). No write_products.
scopes = "read_products,write_discounts,read_discounts"

[auth]
redirect_urls = ["https://free-gift-tiered.vercel.app/api/auth/callback"]

[app_proxy]
# Storefront https://{shop}/apps/free-gift/* -> {application_url}/apps/free-gift/*
url = "https://free-gift-tiered.vercel.app/apps/free-gift"
prefix = "apps"
subpath = "free-gift"

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "https://free-gift-tiered.vercel.app/api/webhooks"

  # Privacy/compliance topics: not required for a custom single-store app holding no shopper PII,
  # but acknowledged defensively (HMAC-verified, nothing to return/erase) so distribution can change
  # later. All point at the same verified webhook endpoint.
  [webhooks.privacy_compliance]
  customer_data_request_url = "https://free-gift-tiered.vercel.app/api/webhooks"
  customer_deletion_url = "https://free-gift-tiered.vercel.app/api/webhooks"
  shop_deletion_url = "https://free-gift-tiered.vercel.app/api/webhooks"
