# Input for the cart.validations.generate.run target (validated against the
# functions_cart_checkout_validation schema). Request ONLY what the rule needs (perf): each line's
# POST-discount total + the FGE gift marker. The attribute key MUST match packages/core
# GIFT_LINE_PROPERTY ('_fge_gift') — asserted in run.test.ts so the two can't drift.
query Input {
  cart {
    lines {
      cost {
        totalAmount {
          amount
        }
      }
      isFreeGift: attribute(key: "_fge_gift") {
        value
      }
    }
  }
}
