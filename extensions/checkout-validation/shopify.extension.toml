# Cart & Checkout Validation Function (Shopify CLI). Blocks checkout when an FGE `_fge_gift` line is no
# longer free (Approach A — see docs/checkout-validation-function-design.md). VF-1 declares intent; the
# Wasm build + activation happen at VF-2 (`shopify app deploy`, then Settings -> Checkout -> Checkout
# Rules: add the rule, Activate, and set "Allow all customers to submit checkout" = ON for fail-open on
# runtime exceptions).
#
# This is a JavaScript/TypeScript function: Shopify CLI compiles src/run.ts to dist/index.wasm via Javy
# (enabled by the @shopify/shopify_function dependency in package.json), so [build].command is OMITTED
# on purpose — the CLI auto-builds JS functions. `pnpm install` MUST have run so the dependency is in
# the workspace node_modules before `shopify app deploy`. Output path defaults to dist/index.wasm.
api_version = "2026-04"

[[extensions]]
uid = "6d8f62f5-68de-fb89-8b03-169c05eaef7ca98ca7c8"
type = "function"
name = "FGE free-gift checkout gate"
handle = "fge-checkout-gift-gate"

  [extensions.build]
  watch = ["src/**/*.ts"]

  [[extensions.targeting]]
  target = "cart.validations.generate.run"
  input_query = "src/run.graphql"
  export = "cartValidationsGenerateRun"
